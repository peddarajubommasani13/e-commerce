<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — MAISON</title>
  <link rel="stylesheet" href="../css/design-system.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="page-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-logo">
        <div class="navbar-logo-mark">M</div>
        <span class="navbar-logo-text">MAISON Dashboard</span>
      </a>
      <div class="navbar-actions">
        <a href="shop.html" class="btn btn-ghost btn-sm">View Shop</a>
        <button class="btn btn-ghost btn-sm" id="nav-logout-btn">Sign Out</button>
      </div>
    </div>
  </nav>

  <main class="container admin-container">
    <div class="admin-header">
      <h1 class="font-heading text-3xl">Admin Dashboard</h1>
      <div class="tab-controls">
        <button class="tab-btn active" onclick="switchTab('stats')">Overview Stats</button>
        <button class="tab-btn" onclick="switchTab('products')">Manage Products</button>
        <button class="tab-btn" onclick="switchTab('orders')">Manage Orders</button>
      </div>
    </div>

    <!-- TAB 1: OVERVIEW STATS -->
    <div id="tab-stats" class="tab-content active">
      <div id="stats-loader" class="text-center" style="padding: 40px 0;"><span class="spinner"></span></div>
      <div class="stats-grid" id="stats-grid" style="display: none;">
        <div class="stat-card card">
          <h3>Total Revenue</h3>
          <span class="stat-num" id="stat-revenue">$0.00</span>
        </div>
        <div class="stat-card card">
          <h3>Orders Placed</h3>
          <span class="stat-num" id="stat-orders">0</span>
        </div>
        <div class="stat-card card">
          <h3>Active Customers</h3>
          <span class="stat-num" id="stat-users">0</span>
        </div>
        <div class="stat-card card">
          <h3>Active Products</h3>
          <span class="stat-num" id="stat-products">0</span>
        </div>
      </div>
    </div>

    <!-- TAB 2: MANAGE PRODUCTS -->
    <div id="tab-products" class="tab-content">
      <div class="tab-action-row" style="margin-bottom: var(--space-4); display: flex; justify-content: flex-end;">
        <button class="btn btn-primary btn-sm" onclick="openProductModal()">+ Add New Product</button>
      </div>

      <div class="table-container card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="admin-products-tbody">
            <!-- Populated dynamically -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- TAB 3: MANAGE ORDERS -->
    <div id="tab-orders" class="tab-content">
      <div class="table-container card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Date</th>
              <th>Amount</th>
              <th>Order Status</th>
              <th>Payment Status</th>
              <th>Update Status</th>
            </tr>
          </thead>
          <tbody id="admin-orders-tbody">
            <!-- Populated dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- PRODUCT ADD/EDIT MODAL -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal-card card">
      <div class="modal-header">
        <h2 class="font-heading text-xl" id="modal-title">Add Product</h2>
        <button class="modal-close" onclick="closeProductModal()">×</button>
      </div>
      <form id="product-form" onsubmit="handleSaveProduct(event)">
        <input type="hidden" id="form-product-id">

        <div class="form-group" style="margin-bottom: var(--space-3);">
          <label class="form-label" for="form-name">Product Name</label>
          <input type="text" id="form-name" class="form-input" required>
        </div>

        <div class="form-group" style="margin-bottom: var(--space-3);">
          <label class="form-label" for="form-desc">Description</label>
          <textarea id="form-desc" class="form-textarea" rows="3" required></textarea>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-3);">
          <div class="form-group">
            <label class="form-label" for="form-price">Base Price ($)</label>
            <input type="number" id="form-price" class="form-input" required step="0.01" min="0.01">
          </div>
          <div class="form-group">
            <label class="form-label" for="form-discount">Discount Price ($)</label>
            <input type="number" id="form-discount" class="form-input" step="0.01" min="0">
          </div>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-3);">
          <div class="form-group">
            <label class="form-label" for="form-category">Category</label>
            <select id="form-category" class="form-select" required>
              <option value="1">Women</option>
              <option value="2">Men</option>
              <option value="3">Accessories</option>
              <option value="4">Sale</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="form-stock">Stock Quantity</label>
            <input type="number" id="form-stock" class="form-input" required min="0">
          </div>
        </div>

        <div class="form-group" style="margin-bottom: var(--space-3);">
          <label class="form-label" for="form-images">Image URL (comma separated)</label>
          <input type="text" id="form-images" class="form-input" placeholder="https://unsplash.com/...">
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-5);">
          <div class="form-group">
            <label class="form-label" for="form-sizes">Sizes (comma separated)</label>
            <input type="text" id="form-sizes" class="form-input" placeholder="S,M,L">
          </div>
          <div class="form-group">
            <label class="form-label" for="form-colors">Colors (comma separated)</label>
            <input type="text" id="form-colors" class="form-input" placeholder="Black,White">
          </div>
        </div>

        <div style="display:flex; justify-content:flex-end; gap: var(--space-3);">
          <button type="button" class="btn btn-ghost btn-sm" onclick="closeProductModal()">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm" id="form-save-btn">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom">
      <span>© 2026 MAISON Dashboard. All rights reserved.</span>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
