<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — MAISON</title>
  <link rel="stylesheet" href="../css/design-system.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/checkout.css" />
</head>
<body class="page-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-logo">
        <div class="navbar-logo-mark">M</div>
        <span class="navbar-logo-text">MAISON</span>
      </a>
      <span class="text-muted" style="font-size: var(--text-sm); font-weight: 500;">Secure Checkout</span>
    </div>
  </nav>

  <main class="container checkout-container">
    <div id="checkout-loader" class="text-center" style="padding: 60px 0;">
      <span class="spinner"></span>
    </div>

    <form id="checkout-form" class="checkout-layout-grid" style="display: none;" onsubmit="handlePlaceOrder(event)">
      <!-- Form Details -->
      <div class="checkout-form-panel">
        <!-- Shipping details -->
        <section class="checkout-section">
          <h2 class="checkout-section-title">Shipping Address</h2>
          
          <div class="form-group" style="margin-bottom: var(--space-4);">
            <label class="form-label" for="ship-name">Full Name</label>
            <input type="text" id="ship-name" class="form-input" required placeholder="Jane Doe">
          </div>

          <div class="form-group" style="margin-bottom: var(--space-4);">
            <label class="form-label" for="ship-address">Street Address</label>
            <input type="text" id="ship-address" class="form-input" required placeholder="123 Luxury Ave, Apt 4B">
          </div>

          <div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-bottom: var(--space-4);">
            <div class="form-group">
              <label class="form-label" for="ship-city">City</label>
              <input type="text" id="ship-city" class="form-input" required placeholder="New York">
            </div>
            <div class="form-group">
              <label class="form-label" for="ship-state">State / Province</label>
              <input type="text" id="ship-state" class="form-input" required placeholder="NY">
            </div>
          </div>

          <div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--space-4);">
            <div class="form-group">
              <label class="form-label" for="ship-zip">Zip / Postal Code</label>
              <input type="text" id="ship-zip" class="form-input" required placeholder="10001">
            </div>
            <div class="form-group">
              <label class="form-label" for="ship-country">Country</label>
              <input type="text" id="ship-country" class="form-input" required placeholder="United States">
            </div>
          </div>
        </section>

        <!-- Payment details (mock) -->
        <section class="checkout-section" style="margin-top: var(--space-8);">
          <h2 class="checkout-section-title">Payment Method</h2>
          <div class="badge badge-accent" style="margin-bottom: var(--space-4);">MOCK PAYMENT ENABLED</div>

          <div class="payment-method-card">
            <div class="form-group" style="margin-bottom: var(--space-4);">
              <label class="form-label" for="card-name">Cardholder Name</label>
              <input type="text" id="card-name" class="form-input" required placeholder="JANE DOE">
            </div>

            <div class="form-group" style="margin-bottom: var(--space-4);">
              <label class="form-label" for="card-number">Card Number</label>
              <input type="text" id="card-number" class="form-input" required placeholder="4111 2222 3333 4444" pattern="^[0-9 ]{15,19}$" maxlength="19">
            </div>

            <div class="grid" style="grid-template-columns: 2fr 1fr; gap: var(--space-4);">
              <div class="form-group">
                <label class="form-label" for="card-expiry">Expiry Date</label>
                <input type="text" id="card-expiry" class="form-input" required placeholder="MM/YY" pattern="^(0[1-9]|1[0-2])\/?([0-9]{2})$" maxlength="5">
              </div>
              <div class="form-group">
                <label class="form-label" for="card-cvc">CVC</label>
                <input type="password" id="card-cvc" class="form-input" required placeholder="•••" pattern="^[0-9]{3,4}$" maxlength="4">
              </div>
            </div>
          </div>
        </section>
      </div>

      <!-- Order Review Sidebar -->
      <div class="checkout-summary-panel">
        <div class="card" style="padding: var(--space-6);">
          <h2 class="font-heading text-lg" style="margin-bottom: var(--space-4); border-bottom: 1px solid var(--color-border); padding-bottom: var(--space-3);">Order Summary</h2>

          <!-- Line items -->
          <div class="checkout-line-items" id="checkout-line-items" style="max-height: 240px; overflow-y: auto; margin-bottom: var(--space-4);">
            <!-- Populated by JS -->
          </div>

          <div class="divider"></div>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="checkout-subtotal">$0.00</span>
          </div>
          <div class="summary-row" id="checkout-discount-row" style="display: none;">
            <span>Discount</span>
            <span class="price-discount" id="checkout-discount">-$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span style="color: var(--color-success); font-weight: 600;">FREE</span>
          </div>
          <div class="divider"></div>
          <div class="summary-row total-row">
            <span>Total</span>
            <span id="checkout-total">$0.00</span>
          </div>

          <button type="submit" class="btn btn-accent btn-lg btn-full" id="place-order-btn" style="margin-top: var(--space-6);">Place Order & Pay</button>
          
          <a href="cart.html" class="btn btn-ghost btn-sm btn-full text-center" style="margin-top: var(--space-2);">Back to Cart</a>
        </div>
      </div>
    </form>
  </main>

  <footer class="footer">
    <div class="footer-bottom">
      <span>© 2026 MAISON. All rights reserved.</span>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/checkout.js"></script>
</body>
</html>
